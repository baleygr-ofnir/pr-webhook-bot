---
services:
  pr-webhook-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pr-webhook-relay
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    security_opt:
      - no-new-privileges:true
    networks:
      - npm_proxy

networks:
  npm_proxy:
    external: true